<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="4" fill="#0a0a12"/>
  <!-- USB-A plug (TSK red, readable at 16px) -->
  <rect x="11" y="6" width="4" height="5" rx="0.5" fill="#ff3333"/>
  <rect x="17" y="6" width="4" height="5" rx="0.5" fill="#ff3333"/>
  <rect x="9" y="11" width="14" height="12" rx="1.5" fill="#ff1a1a"/>
  <rect x="10" y="12" width="12" height="10" rx="1" fill="#cc1515"/>
  <!-- connector block -->
  <rect x="12" y="21" width="8" height="4" rx="0.5" fill="#ff1a1a"/>
  <!-- cable -->
  <rect x="14" y="25" width="4" height="3" rx="0.5" fill="#ff4444"/>
  <circle cx="16" cy="16" r="14" stroke="#ff1a1a" stroke-width="0.5" opacity="0.25"/>
</svg>
